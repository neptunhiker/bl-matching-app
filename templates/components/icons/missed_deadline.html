<svg class="{{ class|default:'' }}" width="100%" height="100%" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true" preserveAspectRatio="xMidYMid meet">
  <!-- clock face -->
  <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="4"/>

  <!-- hour hand -->
  <line x1="64" y1="64" x2="58" y2="38" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- minute hand (pushed forward = late feeling) -->
  <line x1="64" y1="64" x2="96" y2="70" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>

  <!-- center dot -->
  <circle cx="64" cy="64" r="3" fill="currentColor"/>

  <!-- subtle top tick -->
  <line x1="64" y1="6" x2="64" y2="16" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>
