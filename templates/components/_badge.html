<span class="inline-flex items-center rounded-full font-medium
             {% if badge_size == 'sm' %}px-2 py-0.5 text-xs{% elif badge_size == 'lg' %}px-3 py-1 text-sm{% else %}px-2.5 py-1 text-xs{% endif %}
             {% if badge_variant == 'success' %}bg-green-100 text-green-700{% elif badge_variant == 'warning' %}bg-amber-100 text-amber-700{% elif badge_variant == 'danger' %}bg-red-100 text-red-700{% elif badge_variant == 'secondary' %}bg-secondary-100 text-secondary-700{% elif badge_variant == 'neutral' %}bg-neutral-100 text-neutral-700{% else %}bg-primary-100 text-primary-700{% endif %}
             {{ badge_class|default:'' }}">
  {{ badge_text|default:'Badge' }}
</span>
