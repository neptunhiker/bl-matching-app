{% if layout_mode == 'start' %}
<section class="{{ layout_outer_class|default:'max-w-5xl mx-auto px-4 sm:px-6 py-10' }}">
  {% if layout_title %}
  <header class="mb-8 {{ layout_header_class|default:'' }}">
    <h1 class="text-2xl sm:text-3xl font-semibold text-tertiary-700">{{ layout_title }}</h1>
    {% if layout_subtitle %}
    <p class="mt-2 text-sm text-neutral-500">{{ layout_subtitle }}</p>
    {% endif %}
  </header>
  {% endif %}
{% else %}
</section>
{% endif %}
