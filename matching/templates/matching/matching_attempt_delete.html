{% extends "base.html" %}
{% block title %}Matching löschen{% endblock %}
{% block body %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 py-8">
  <div class="bg-white rounded-2xl shadow-sm ring-1 ring-neutral-200 overflow-hidden">
    <div class="p-6">
      <h1 class="text-2xl font-bold mb-4">Matching löschen</h1>
      <p class="text-sm text-neutral-700 mb-4">
        Möchtest Du das Matching für <strong>{{ object.participant }}</strong> wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.
      </p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold bg-red-600 hover:bg-red-700 border border-red-600 text-white shadow-sm">Löschen</button>
        <a href="{% url 'matching_attempt_detail' object.pk %}" class="ml-3 text-sm text-neutral-500">Abbrechen</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
